{% load static %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<nav class="bg-[#e2f7f1] border-b border-emerald-100 sticky top-0 z-50 shadow-sm transition-all duration-300">
    <div class="container mx-auto px-4 md:px-10">
        <div class="grid grid-cols-3 items-center h-16 md:h-24 overflow-visible">

            <div class="flex justify-start items-center">
                <a href="{% url 'home' %}"
                    class="transition-transform duration-500 hover:scale-110 transform-gpu z-50 block">
                    <img src="/media/home_banners/icono_glow_korea.png" alt="Logo"
                        class="w-auto h-12 md:h-20 object-contain">
                </a>
            </div>

            <div class="flex justify-center items-center">
                <a href="{% url 'home' %}"
                    class="text-center group transition-transform duration-500 hover:scale-105 transform-gpu">
                    <span
                        class="text-xl md:text-2xl font-semibold tracking-tighter leading-tight transition-all duration-300 text-[#194f22] group-hover:text-[#ebe0a9]"
                        style="font-family: 'Montserrat', sans-serif; text-transform: uppercase;">
                        Glow Korea
                    </span>
                </a>
            </div>

            <div class="flex justify-end items-center space-x-4 md:space-x-8">
                <a href="{% url 'catalogo' %}"
                    class="hidden lg:block text-[11px] font-semibold uppercase tracking-[0.2em] text-[#194f22] hover:text-[#ebe0a9] transition-colors duration-300 italic">
                    Catálogo
                </a>

                <a href="{% url 'carrito' %}"
                    class="relative p-1.5 text-[#194f22] hover:text-[#ebe0a9] transition-all duration-300 flex items-center">
                    <i class="bi bi-cart3 text-2xl md:text-3xl"></i>
                    {% if cart_count %}
                    <span
                        class="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full ring-2 ring-[#e2f7f1]">
                        {{ cart_count }}
                    </span>
                    {% endif %}
                </a>

                <button class="lg:hidden text-[#194f22] hover:text-[#ebe0a9] transition-colors duration-300">
                    <i class="bi bi-list text-3xl"></i>
                </button>
            </div>

        </div>
    </div>
</nav>
